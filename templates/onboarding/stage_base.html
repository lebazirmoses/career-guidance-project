{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto py-12">
    <div class="mb-10 text-center">
        <div class="flex items-center justify-center space-x-3 mb-4">
            {% for i in "1234" %}
                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm 
                    {% if stage >= i|add:0 %}bg-blue-600 text-white shadow-lg shadow-blue-200{% else %}bg-slate-200 text-slate-500{% endif %}">
                    {{ i }}
                </div>
                {% if not forloop.last %}<div class="w-8 h-1 bg-slate-200 rounded-full"></div>{% endif %}
            {% endfor %}
        </div>
        <h1 class="text-3xl font-black text-slate-900">Step {{ stage }}: Academic Profile</h1>
    </div>

    <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-2xl shadow-slate-200/50">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-5">
                {{ form.as_p }}
            </div>
            <button type="submit" class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800 transition-all flex items-center justify-center group mt-8">
                Continue to Next Step
                <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>
    </div>
</div>
{% endblock %}
