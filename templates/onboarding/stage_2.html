<form method="POST" class="space-y-6">
    {% csrf_token %}
    {% for field in form %}
        <div class="space-y-1">
            <label class="block text-sm font-bold text-slate-700">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
                <p class="text-xs text-slate-500">{{ field.help_text }}</p>
            {% endif %}
            {% for error in field.errors %}
                <p class="text-xs text-red-500">{{ error }}</p>
            {% endfor %}
        </div>
    {% endfor %}
    <button type="submit" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition">
        Continue
    </button>
</form>
