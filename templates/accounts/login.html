{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-2xl">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-slate-900">Login</h2>
            <p class="text-slate-500 mt-2">Welcome back to FutureAI</p>
        </div>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Email Address</label>
                {{ form.username }}
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Password</label>
                {{ form.password }}
            </div>
            
            <button type="submit" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                Sign In
            </button>
        </form>
        
        <div class="mt-8 text-center text-sm">
            <span class="text-slate-500">Don't have an account?</span>
            <a href="{% url 'accounts:register' %}" class="text-blue-600 font-bold hover:underline ml-1">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
